<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💖 Para mi amor - Todas las secciones completas 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;1,400;1,600&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cormorant Garamond', serif;
            background: #fde8f0;
            color: #7c3f6a;
            overflow-x: hidden;
        }
        /* Pantalla de regalo */
        .gift-screen {
            position: fixed; inset: 0; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 30% 30%, #fbcfe8, #e9d5ff);
            transition: opacity 0.8s;
        }
        .gift-card {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 40px; padding: 40px; text-align: center;
            cursor: pointer; width: 90%; max-width: 400px;
        }
        .gift-emoji { font-size: 5rem; animation: bounce 1s infinite; }
        @keyframes bounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-15px); } }
        .progress-bar-gift { width: 100%; height: 12px; background: #fbcfe8; border-radius: 20px; margin: 20px 0; overflow: hidden; }
        .progress-fill-gift { width: 0%; height: 100%; background: linear-gradient(90deg, #f472b6, #ec4899); transition: width 0.2s; }
        
        /* App principal */
        .main-app { display: none; min-height: 100vh; padding-bottom: 100px; }
        .global-progress {
            position: fixed; top: 10px; right: 10px; background: rgba(255,255,255,0.9);
            padding: 8px 15px; border-radius: 30px; z-index: 1000;
            font-family: 'Dancing Script', cursive; font-size: 0.8rem;
        }
        .global-bar-outer { width: 150px; height: 6px; background: #fbcfe8; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .global-bar-inner { width: 0%; height: 100%; background: linear-gradient(90deg, #f472b6, #ec4899); transition: width 0.3s; }
        
        /* Menú */
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 120px));
            gap: 20px; justify-content: center; padding: 100px 20px 40px; max-width: 900px; margin: 0 auto;
        }
        .menu-card {
            background: white; border-radius: 20px; padding: 15px 10px; text-align: center;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(244,114,182,0.2);
            border: 1px solid #fbb6ce;
        }
        .menu-card.locked { opacity: 0.5; filter: grayscale(0.3); cursor: not-allowed; position: relative; }
        .menu-card.locked::after { content: "🔒"; position: absolute; top: 5px; right: 10px; font-size: 1.2rem; }
        .menu-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; margin-bottom: 8px; background: #fbcfe8; }
        .menu-card h3 { font-family: 'Dancing Script', cursive; font-size: 0.9rem; color: #be185d; }
        
        /* Reproductor global */
        .global-player {
            position: fixed; bottom: 20px; left: 20px; background: rgba(255,255,255,0.95);
            border-radius: 50px; padding: 8px 15px; display: flex; gap: 12px; z-index: 1000;
        }
        .global-player button { background: #f472b6; border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        
        /* Modal de sección */
        .section-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; display: none;
            justify-content: center; align-items: center; overflow-y: auto;
        }
        .section-content {
            background: #fff8f4; width: 90%; max-width: 700px; max-height: 90vh;
            overflow-y: auto; border-radius: 30px; padding: 20px; position: relative;
            border: 3px solid #fbb6ce;
        }
        .close-section { position: sticky; top: 0; float: right; background: #ec4899; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        .achievement-panel { background: #fde8f0; border-radius: 20px; padding: 10px; margin: 15px 0; font-size: 0.8rem; }
        .achievement-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        
        /* Carrusel */
        .carousel-container { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; border-radius: 20px; margin: 10px 0; }
        .carousel-slide { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        .carousel-slide.active { display: block; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        .carousel-prev { left: 10px; } .carousel-next { right: 10px; }
        
        /* Juego RPG (mapa) */
        .game-map { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #a8e6cf; padding: 10px; border-radius: 10px; }
        .game-cell { aspect-ratio: 1; background: #c8e6df; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
        .game-cell.player { background: #ffb6c1; }
        .game-cell.enemy { background: #ff8c94; cursor: pointer; }
        .battle-area { margin-top: 15px; padding: 10px; background: #ffe4e6; border-radius: 10px; display: none; }
        
        /* Paisaje digital */
        .canvas-draw { border: 2px solid #f472b6; border-radius: 10px; background: white; cursor: crosshair; }
        
        /* Mapa de amor */
        .love-map { position: relative; width: 100%; height: 300px; background: #b8e1fc; border-radius: 20px; overflow: hidden; }
        .map-pin { position: absolute; width: 30px; height: 30px; background: #ec4899; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; transform: translate(-50%, -50%); }
        
        /* Flores jardín */
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .garden-flower { background: #f9e0a0; border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .garden-flower:active { transform: scale(0.95); }
        
        /* Caja 3D simple */
        .box3d { width: 200px; height: 200px; margin: 20px auto; position: relative; transform-style: preserve-3d; animation: rotateBox 10s infinite linear; }
        @keyframes rotateBox { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .box-face { position: absolute; width: 200px; height: 200px; background: rgba(244,114,182,0.7); border: 2px solid white; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
        .box-front { transform: translateZ(100px); } .box-back { transform: rotateY(180deg) translateZ(100px); }
        .box-left { transform: rotateY(-90deg) translateZ(100px); } .box-right { transform: rotateY(90deg) translateZ(100px); }
        
        /* Preguntas del corazón */
        .quiz-question { margin: 15px 0; }
        .quiz-option { display: block; margin: 5px 0; }
        
        /* Carta infinita */
        .infinite-letter { max-height: 300px; overflow-y: auto; padding: 15px; background: #fff0e0; border-radius: 15px; font-family: 'Dancing Script', cursive; font-size: 1.1rem; }
        
        button, .btn { background: #f472b6; border: none; padding: 8px 20px; border-radius: 50px; color: white; cursor: pointer; margin: 5px; }
        .time-counter { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .time-unit { background: #fbcfe8; border-radius: 15px; padding: 10px; text-align: center; min-width: 70px; }
        .time-number { font-size: 1.8rem; font-weight: bold; }
        .deco-clickable { font-size: 2rem; display: inline-block; margin: 5px; cursor: pointer; transition: transform 0.2s; }
        .deco-clickable:hover { transform: scale(1.2); }
        .floating-heart { position: fixed; bottom: -40px; font-size: 1.5rem; pointer-events: none; z-index: 9998; animation: floatUp 8s linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0.8; } 100% { transform: translateY(-110vh); opacity: 0; } }
        @media (max-width: 600px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } .menu-card img { width: 50px; height: 50px; } }
    </style>
</head>
<body>

<div id="giftScreen" class="gift-screen">
    <div class="gift-card" id="giftCard">
        <div class="gift-emoji">🎁🎂</div>
        <h1>🎂 ¡Feliz Cumpleaños, mi amor! 🎂</h1>
        <p>Aprieta el regalo para abrirlo 💝</p>
        <div class="progress-bar-gift"><div class="progress-fill-gift" id="giftFill"></div></div>
        <p id="clickCounter">0 / 20 clics</p>
    </div>
</div>

<div id="mainApp" class="main-app">
    <div class="global-progress">Progreso: <span id="progressCount">0</span>/12<br><div class="global-bar-outer"><div class="global-bar-inner" id="globalBar"></div></div></div>
    <div class="menu-grid" id="menuGrid"></div>
    <div class="global-player" id="globalPlayer">
        <button id="globalPrev">⏮</button>
        <button id="globalPlayPause">▶</button>
        <button id="globalNext">⏭</button>
        <span id="globalSongName">🎵 Canción</span>
    </div>
</div>
<div id="modalContainer"></div>

<script>
    // ========== CONFIGURACIÓN ==========
    const CLICS_NECESARIOS = 20;
    const FECHA_INICIO_AMOR = "2025-03-18";
    let clicsHechos = 0;
    let sectionsCompleted = [false, false, false, false, false, false, false, false, false, false, false, false, false];
    let unlocked13 = false;
    let currentSongIndex = 0;
    let isPlaying = false;
    let globalAudio = new Audio();
    
    // Playlist (10 canciones demo)
    const PLAYLIST = Array(10).fill().map((_, i) => ({ name: `Canción ${i+1} - Amor eterno`, src: `https://www.soundhelix.com/examples/mp3/SoundHelix-Song-${i+1}.mp3` }));
    
    const OPCIONES_MENU = [
        { img: "assets/menu/opcion1.jpg", titulo: "📷 Carta Romántica", seccion: 1, bloqueada: false },
        { img: "assets/menu/opcion2.jpg", titulo: "🎵 Playlist", seccion: 2, bloqueada: false },
        { img: "assets/menu/opcion3.jpg", titulo: "📝 Test de Amor", seccion: 3, bloqueada: false },
        { img: "assets/menu/opcion4.jpg", titulo: "🎮 Juego RPG", seccion: 4, bloqueada: false },
        { img: "assets/menu/opcion5.jpg", titulo: "💌 Carta Interactiva", seccion: 5, bloqueada: false },
        { img: "assets/menu/opcion6.jpg", titulo: "🎨 Paisaje Digital", seccion: 6, bloqueada: false },
        { img: "assets/menu/opcion7.jpg", titulo: "🌌 Nuestro Universo", seccion: 7, bloqueada: false },
        { img: "assets/menu/opcion8.jpg", titulo: "🌻 Jardín Secreto", seccion: 8, bloqueada: false },
        { img: "assets/menu/opcion9.jpg", titulo: "🗺️ Mapa del Amor", seccion: 9, bloqueada: false },
        { img: "assets/menu/opcion10.jpg", titulo: "📦 Caja 3D", seccion: 10, bloqueada: false },
        { img: "assets/menu/opcion11.jpg", titulo: "❤️ Preguntas Corazón", seccion: 11, bloqueada: false },
        { img: "assets/menu/opcion12.jpg", titulo: "📜 Carta Infinita", seccion: 12, bloqueada: false },
        { img: "assets/menu/opcion13.jpg", titulo: "✨ Eterno Amor ✨", seccion: 13, bloqueada: true }
    ];
    
    // ========== FUNCIONES GENERALES ==========
    function updateGlobalProgress() {
        let completed = 0;
        for (let i = 1; i <= 12; i++) if (sectionsCompleted[i]) completed++;
        document.getElementById('progressCount').innerText = completed;
        document.getElementById('globalBar').style.width = (completed/12)*100 + '%';
        if (completed === 12 && !unlocked13) {
            unlocked13 = true;
            alert("🎉✨ ¡HAS DESBLOQUEADO LA SECCIÓN ESPECIAL: ETERNO AMOR! ✨🎉");
            buildMenu();
        }
    }
    
    function markSectionComplete(secNum) {
        if (!sectionsCompleted[secNum] && secNum <= 12) {
            sectionsCompleted[secNum] = true;
            updateGlobalProgress();
        }
    }
    
    // Música global
    function loadSong(idx) {
        currentSongIndex = (idx + PLAYLIST.length) % PLAYLIST.length;
        globalAudio.src = PLAYLIST[currentSongIndex].src;
        document.getElementById('globalSongName').innerText = PLAYLIST[currentSongIndex].name;
        if (isPlaying) globalAudio.play();
    }
    function togglePlay() { if (isPlaying) { globalAudio.pause(); isPlaying=false; document.getElementById('globalPlayPause').innerText='▶'; } else { globalAudio.play(); isPlaying=true; document.getElementById('globalPlayPause').innerText='⏸'; } }
    function nextSong() { loadSong(currentSongIndex+1); if(isPlaying) globalAudio.play(); }
    function prevSong() { loadSong(currentSongIndex-1); if(isPlaying) globalAudio.play(); }
    
    // Menú
    function buildMenu() {
        const container = document.getElementById('menuGrid');
        container.innerHTML = '';
        OPCIONES_MENU.forEach(opt => {
            const card = document.createElement('div'); card.className = 'menu-card';
            if (opt.bloqueada && !unlocked13) card.classList.add('locked');
            card.innerHTML = `<img src="${opt.img}" onerror="this.src='https://via.placeholder.com/60?text=📷'"><h3>${opt.titulo}</h3>`;
            card.onclick = () => { if (!opt.bloqueada || unlocked13) openSection(opt.seccion); };
            container.appendChild(card);
        });
    }
    
    // ========== SECCIONES COMPLETAS ==========
    function openSection(secNum) {
        const modalDiv = document.createElement('div'); modalDiv.className = 'section-modal';
        modalDiv.innerHTML = `<div class="section-content"><button class="close-section">✖</button><div id="secContent${secNum}"></div><div class="achievement-panel" id="achievements${secNum}"></div><button class="back-menu">Volver al menú</button></div>`;
        document.getElementById('modalContainer').appendChild(modalDiv);
        modalDiv.style.display = 'flex';
        modalDiv.querySelector('.close-section').onclick = () => modalDiv.remove();
        modalDiv.querySelector('.back-menu').onclick = () => modalDiv.remove();
        const contentDiv = modalDiv.querySelector(`#secContent${secNum}`);
        const achievDiv = modalDiv.querySelector(`#achievements${secNum}`);
        
        // Simular logros (marcadores)
        achievDiv.innerHTML = `<strong>Logros (completar todo):</strong><div class="achievement-item"><input type="checkbox" id="ach${secNum}_1"> Interactuar con todo</div><div class="achievement-item"><input type="checkbox" id="ach${secNum}_2"> Permanecer 30s</div><button id="simulateComplete${secNum}">✅ Completar sección</button>`;
        modalDiv.querySelector(`#simulateComplete${secNum}`).onclick = () => { markSectionComplete(secNum); modalDiv.remove(); };
        
        // SECCIÓN 1: Carta Romántica (carrusel)
        if (secNum === 1) {
            contentDiv.innerHTML = `<h3>Carta Romántica</h3><div class="carousel-container" id="carousel1"><img class="carousel-slide active" src="https://via.placeholder.com/300x400?text=Imagen+1"><img class="carousel-slide" src="https://via.placeholder.com/300x400?text=Imagen+2"><img class="carousel-slide" src="https://via.placeholder.com/300x400?text=Imagen+3"><button class="carousel-btn carousel-prev">❮</button><button class="carousel-btn carousel-next">❯</button></div>`;
            let slides = modalDiv.querySelectorAll('#carousel1 .carousel-slide'), idx=0;
            modalDiv.querySelector('.carousel-prev').onclick = () => { slides[idx].classList.remove('active'); idx = (idx-1+slides.length)%slides.length; slides[idx].classList.add('active'); };
            modalDiv.querySelector('.carousel-next').onclick = () => { slides[idx].classList.remove('active'); idx = (idx+1)%slides.length; slides[idx].classList.add('active'); };
        }
        // SECCIÓN 2: Playlist (expandida)
        else if (secNum === 2) {
            contentDiv.innerHTML = `<h3>Playlist Musical</h3><p>Canción actual: ${PLAYLIST[currentSongIndex].name}</p><button id="playExpand">⏸</button><button id="nextExpand">⏭</button>`;
            modalDiv.querySelector('#playExpand').onclick = togglePlay;
            modalDiv.querySelector('#nextExpand').onclick = nextSong;
        }
        // SECCIÓN 3: Test de Amor (20 preguntas)
        else if (secNum === 3) {
            let preguntas = Array(20).fill().map((_,i) => ({ pregunta: `Pregunta ${i+1}: ¿Cuál es mi color favorito?`, opciones: ["Rojo","Azul","Verde","Rosa"], correcta: 3 }));
            let qIndex = 0, respuestas = [];
            function renderQuestion() {
                let q = preguntas[qIndex];
                contentDiv.innerHTML = `<h3>Test de Amor (${qIndex+1}/${preguntas.length})</h3><p>${q.pregunta}</p>${q.opciones.map((opt,i)=>`<label><input type="radio" name="q" value="${i}"> ${opt}</label><br>`).join('')}<button id="nextQ">Siguiente</button>`;
                modalDiv.querySelector('#nextQ').onclick = () => {
                    let selected = modalDiv.querySelector('input[name="q"]:checked');
                    if(selected) respuestas[qIndex] = parseInt(selected.value);
                    if(qIndex+1 < preguntas.length) { qIndex++; renderQuestion(); }
                    else { contentDiv.innerHTML = `<h3>Resultado</h3><p>Puntuación: ${respuestas.filter((r,i)=>r===preguntas[i].correcta).length}/${preguntas.length}</p><button id="reiniciarTest">Reiniciar</button>`;
                        modalDiv.querySelector('#reiniciarTest').onclick = () => { qIndex=0; respuestas=[]; renderQuestion(); };
                    }
                };
            }
            renderQuestion();
        }
        // SECCIÓN 4: Juego RPG (mapa 5x5)
        else if (secNum === 4) {
            let mapa = []; let playerPos = {x:0,y:0}; let enemies = [{x:2,y:2},{x:4,y:3}]; let score=0, level=1;
            function renderMapa() {
                let html = '<div class="game-map" style="display:grid;grid-template-columns:repeat(5,1fr);">';
                for(let y=0;y<5;y++) for(let x=0;x<5;x++) {
                    let isPlayer = (playerPos.x===x && playerPos.y===y);
                    let isEnemy = enemies.some(e=>e.x===x && e.y===y);
                    html += `<div class="game-cell ${isPlayer?'player':''} ${isEnemy?'enemy':''}" data-x="${x}" data-y="${y}">${isPlayer?'😊':isEnemy?'👾':''}</div>`;
                }
                html += `</div><p>Puntos: ${score} | Nivel: ${level}</p><button id="resetGame">Reiniciar</button><div id="battleArea" class="battle-area"></div>`;
                contentDiv.innerHTML = html;
                document.querySelectorAll('.game-cell').forEach(cell => {
                    cell.onclick = () => {
                        let x = parseInt(cell.dataset.x), y = parseInt(cell.dataset.y);
                        let dx = Math.abs(x-playerPos.x), dy = Math.abs(y-playerPos.y);
                        if((dx===1 && dy===0) || (dx===0 && dy===1)) {
                            playerPos = {x,y};
                            let enemyHere = enemies.find(e=>e.x===x && e.y===y);
                            if(enemyHere) {
                                let battleDiv = modalDiv.querySelector('#battleArea');
                                battleDiv.style.display = 'block';
                                battleDiv.innerHTML = `<p>¡Batalla! Enemigo te ataca.</p><button id="attackBtn">Atacar ❤️</button>`;
                                modalDiv.querySelector('#attackBtn').onclick = () => {
                                    battleDiv.innerHTML = '<p>¡Ganaste! +10 puntos</p>';
                                    score += 10;
                                    if(score >= level*30) { level++; battleDiv.innerHTML += `<p>¡Subiste a nivel ${level}!</p>`; }
                                    enemies = enemies.filter(e=>!(e.x===x && e.y===y));
                                    battleDiv.style.display = 'none';
                                    renderMapa();
                                };
                            } else renderMapa();
                        }
                    };
                });
                modalDiv.querySelector('#resetGame').onclick = () => { playerPos={x:0,y:0}; score=0; level=1; enemies=[{x:2,y:2},{x:4,y:3}]; renderMapa(); };
            }
            renderMapa();
        }
        // SECCIÓN 5: Carta Interactiva
        else if (secNum === 5) {
            contentDiv.innerHTML = `<div class="infinite-letter"><p>Querido amor... Cada <span class="key-word" data-msg="❤️ Te amo">beso</span> tuyo es especial. Recuerdo nuestro primer <span class="key-word" data-msg="📸 14/02/2023">encuentro</span>. Eres mi <span class="key-word" data-msg="∞ Eternidad">todo</span>.</p></div><div id="modalMsg" style="display:none; background:white; padding:10px; border-radius:10px;"></div>`;
            document.querySelectorAll('.key-word').forEach(w => {
                w.style.cssText = 'color:#ec4899; cursor:pointer; text-decoration:underline;';
                w.onclick = () => { alert(w.getAttribute('data-msg')); };
            });
        }
        // SECCIÓN 6: Paisaje Digital (con dibujo)
        else if (secNum === 6) {
            contentDiv.innerHTML = `<h3>Paisaje Digital</h3><canvas id="drawCanvas" width="300" height="300" class="canvas-draw"></canvas><br>
            <input type="color" id="colorPicker" value="#f472b6"><input type="range" id="brushSize" min="1" max="20" value="5"><button id="clearCanvas">Limpiar</button>
            <button id="saveDraw">Guardar dibujo</button><div id="savedMsg"></div><br>
            <h4>Juegos:</h4><button id="playTresRaya">3 en Raya</button><button id="playAhorcado">Ahorcado</button><div id="gameArea"></div>`;
            let canvas = modalDiv.querySelector('#drawCanvas'), ctx = canvas.getContext('2d');
            let drawing = false;
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,300,300);
            canvas.onmousedown = (e) => { drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY); };
            canvas.onmousemove = (e) => { if(drawing) { ctx.lineTo(e.offsetX,e.offsetY); ctx.strokeStyle = modalDiv.querySelector('#colorPicker').value; ctx.lineWidth = modalDiv.querySelector('#brushSize').value; ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY); } };
            canvas.onmouseup = () => drawing=false;
            modalDiv.querySelector('#clearCanvas').onclick = () => { ctx.fillStyle='white'; ctx.fillRect(0,0,300,300); };
            modalDiv.querySelector('#saveDraw').onclick = () => { localStorage.setItem('drawing', canvas.toDataURL()); alert('Dibujo guardado'); };
            modalDiv.querySelector('#playTresRaya').onclick = () => { modalDiv.querySelector('#gameArea').innerHTML = `<div style="display:grid;grid-template-columns:repeat(3,60px);gap:5px;">${Array(9).fill().map((_,i)=>`<button class="ttt-cell" data-i="${i}" style="height:60px;">&nbsp;</button>`).join('')}</div><button id="resetTtt">Reiniciar</button>`;
                let board = Array(9).fill(null), turn='❤️';
                function checkWin() { let wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return wins.some(w=>board[w[0]] && board[w[0]]===board[w[1]] && board[w[0]]===board[w[2]]); }
                document.querySelectorAll('.ttt-cell').forEach(cell => { cell.onclick = () => { let i = parseInt(cell.dataset.i); if(!board[i] && !checkWin()) { board[i]=turn; cell.innerText=turn; if(checkWin()) alert(`¡Ganó ${turn}!`); turn = turn==='❤️'?'⭐':'❤️'; } }; });
                modalDiv.querySelector('#resetTtt').onclick = () => { board.fill(null); turn='❤️'; document.querySelectorAll('.ttt-cell').forEach(c=>c.innerText=''); };
            };
            modalDiv.querySelector('#playAhorcado').onclick = () => {
                let palabras = ['AMOR','BESO','ABRAZO','CORAZON']; let palabra = palabras[Math.floor(Math.random()*palabras.length)];
                let adivinado = Array(palabra.length).fill('_'); let intentos=6;
                function renderAhorcado() { modalDiv.querySelector('#gameArea').innerHTML = `<p>Palabra: ${adivinado.join(' ')}</p><p>Intentos restantes: ${intentos}</p><input id="letraInput" maxlength="1"><button id="adivinarLetra">Adivinar</button><button id="resetAhorcado">Reiniciar</button>`;
                    modalDiv.querySelector('#adivinarLetra').onclick = () => { let letra = modalDiv.querySelector('#letraInput').value.toUpperCase(); if(palabra.includes(letra)) { for(let i=0;i<palabra.length;i++) if(palabra[i]===letra) adivinado[i]=letra; } else intentos--; renderAhorcado(); if(adivinado.join('')===palabra) alert('¡Ganaste!'); if(intentos<=0) alert('Perdiste'); };
                    modalDiv.querySelector('#resetAhorcado').onclick = () => { palabra = palabras[Math.floor(Math.random()*palabras.length)]; adivinado = Array(palabra.length).fill('_'); intentos=6; renderAhorcado(); };
                }
                renderAhorcado();
            };
        }
        // SECCIÓN 7: Universo (simulado)
        else if (secNum === 7) {
            contentDiv.innerHTML = `<h3>🌌 Nuestro Universo</h3><div style="display:flex; gap:20px; justify-content:center;"><div class="planet" data-planet="1">🪐 Planeta Amor</div><div class="planet" data-planet="2">🪐 Planeta Recuerdos</div></div><div id="planetContent"></div>`;
            document.querySelectorAll('.planet').forEach(p => { p.onclick = () => { document.getElementById('planetContent').innerHTML = `<p>Contenido del planeta: momentos especiales...</p><button class="close-planet">Cerrar</button>`;
                modalDiv.querySelector('.close-planet').onclick = () => document.getElementById('planetContent').innerHTML = ''; }; });
        }
        // SECCIÓN 8: Jardín Secreto
        else if (secNum === 8) {
            let flores = Array(9).fill().map((_,i)=>`🌸 Flor ${i+1}`);
            contentDiv.innerHTML = `<h3>🌻 Jardín Secreto</h3><div class="garden-grid">${flores.map((f,i)=>`<div class="garden-flower" data-flower="${i}">${f}</div>`).join('')}</div><button id="regar">💧 Regar jardín</button><div id="florMsg"></div>`;
            document.querySelectorAll('.garden-flower').forEach(f => { f.onclick = () => { document.getElementById('florMsg').innerHTML = `<p>📸 Recuerdo: ${f.innerText} - Te amo mucho</p>`; }; });
            modalDiv.querySelector('#regar').onclick = () => { alert("🌱 ¡Jardín regado! Las flores crecen."); };
        }
        // SECCIÓN 9: Mapa del Amor
        else if (secNum === 9) {
            contentDiv.innerHTML = `<h3>🗺️ Mapa del Amor</h3><div class="love-map" id="loveMap"></div><div id="pinMsg"></div><input id="newPlace" placeholder="Lugar futuro"><button id="addPlace">Agregar</button><ul id="futureList"></ul>`;
            let mapDiv = modalDiv.querySelector('#loveMap');
            let pines = [{x:50,y:80,nombre:"Donde nos conocimos"},{x:200,y:150,nombre:"Primera cita"}];
            pines.forEach(p => { let pin = document.createElement('div'); pin.className='map-pin'; pin.style.left=p.x+'px'; pin.style.top=p.y+'px'; pin.innerHTML='📍'; pin.onclick=()=>document.getElementById('pinMsg').innerHTML=`<p>${p.nombre}: momento especial</p>`; mapDiv.appendChild(pin); });
            modalDiv.querySelector('#addPlace').onclick = () => { let lugar = modalDiv.querySelector('#newPlace').value; if(lugar) { let li = document.createElement('li'); li.innerText = lugar; document.getElementById('futureList').appendChild(li); } };
        }
        // SECCIÓN 10: Caja 3D
        else if (secNum === 10) {
            contentDiv.innerHTML = `<h3>📦 Caja de Recuerdos 3D</h3><div class="box3d"><div class="box-face box-front">📷 Foto</div><div class="box-face box-back">💌 Carta</div><div class="box-face box-left">🎁 Regalo</div><div class="box-face box-right">✨ Sorpresa</div></div><div id="boxMsg"></div>`;
            document.querySelectorAll('.box-face').forEach(face => { face.onclick = () => { document.getElementById('boxMsg').innerHTML = `<p>🎉 Encontraste: ${face.innerText} - Mensaje especial de amor</p>`; }; });
        }
        // SECCIÓN 11: Preguntas del Corazón
        else if (secNum === 11) {
            let preguntas = Array(10).fill().map((_,i)=>({texto:`Pregunta ${i+1}: ¿Cuál es mi hobby favorito?`, opciones:["Leer","Música","Deporte","Cine"], correcta:1, desbloqueo:`📸 Foto ${i+1}`}));
            let idx=0, correctas=0, desbloqueos=[];
            function renderQuiz() {
                if(idx>=preguntas.length) { contentDiv.innerHTML = `<h3>Resultado: ${correctas}/${preguntas.length}</h3><div>Desbloqueos: ${desbloqueos.join(', ')}</div><button id="reiniciarQuiz">Reiniciar</button>`;
                    modalDiv.querySelector('#reiniciarQuiz').onclick = () => { idx=0; correctas=0; desbloqueos=[]; renderQuiz(); };
                    return;
                }
                let q = preguntas[idx];
                contentDiv.innerHTML = `<h3>Pregunta ${idx+1}/${preguntas.length}</h3><p>${q.texto}</p>${q.opciones.map((opt,i)=>`<label><input type="radio" name="quiz" value="${i}"> ${opt}</label><br>`).join('')}<button id="responderQuiz">Responder</button>`;
                modalDiv.querySelector('#responderQuiz').onclick = () => { let sel = modalDiv.querySelector('input[name="quiz"]:checked'); if(sel && parseInt(sel.value)===q.correcta) { correctas++; desbloqueos.push(q.desbloqueo); alert(`¡Correcto! Desbloqueaste: ${q.desbloqueo}`); } idx++; renderQuiz(); };
            }
            renderQuiz();
        }
        // SECCIÓN 12: Carta Infinita
        else if (secNum === 12) {
            contentDiv.innerHTML = `<div class="infinite-letter" id="infiniteLetter" style="max-height:200px; overflow-y:scroll;"><p>Esta es una carta infinita... desplázate hacia abajo para leer más... (continúa) Te amo más cada día... Esto es un mensaje muy largo para simular scroll...</p><p>Más contenido... sigue bajando...</p><p>¡Sorpresa final! 🎁</p></div><div id="sorpresaMsg"></div>`;
            modalDiv.querySelector('#infiniteLetter').onscroll = () => { if(modalDiv.querySelector('#infiniteLetter').scrollTop + modalDiv.querySelector('#infiniteLetter').clientHeight >= modalDiv.querySelector('#infiniteLetter').scrollHeight) { document.getElementById('sorpresaMsg').innerHTML = '<p>✨ ¡Sorpresa! Foto especial ✨</p>'; } };
        }
        // SECCIÓN 13: ETERNO AMOR (con carrusel y contador)
        else if (secNum === 13) {
            contentDiv.innerHTML = `<h3>✨ ETERNO AMOR ✨</h3><div class="carousel-container" id="carousel13"><img class="carousel-slide active" src="https://via.placeholder.com/300x400?text=Amor+1"><img class="carousel-slide" src="https://via.placeholder.com/300x400?text=Amor+2"><img class="carousel-slide" src="https://via.placeholder.com/300x400?text=Amor+3"><button class="carousel-btn carousel-prev">❮</button><button class="carousel-btn carousel-next">❯</button></div><div id="timeCounter" class="time-counter"></div><div><span class="deco-clickable" data-msg="Eres mi sol">💖</span><span class="deco-clickable" data-msg="Te amo infinito">∞</span><span class="deco-clickable" data-msg="Contigo siempre">✨</span></div><button id="downloadLove">📸 Guardar certificado</button>`;
            // Carrusel
            let slides = modalDiv.querySelectorAll('#carousel13 .carousel-slide'), idx13=0;
            modalDiv.querySelector('.carousel-prev').onclick = () => { slides[idx13].classList.remove('active'); idx13=(idx13-1+slides.length)%slides.length; slides[idx13].classList.add('active'); };
            modalDiv.querySelector('.carousel-next').onclick = () => { slides[idx13].classList.remove('active'); idx13=(idx13+1)%slides.length; slides[idx13].classList.add('active'); };
            // Contador
            function updateCounter() {
                let start = new Date(FECHA_INICIO_AMOR), now = new Date(), diff = now-start;
                let seconds = Math.floor(diff/1000), minutes = Math.floor(seconds/60), hours = Math.floor(minutes/60), days = Math.floor(hours/24), months = Math.floor(days/30), years = Math.floor(months/12);
                document.getElementById('timeCounter').innerHTML = `<div class="time-unit"><div class="time-number">${years}</div>Años</div><div class="time-unit"><div class="time-number">${months%12}</div>Meses</div><div class="time-unit"><div class="time-number">${days%30}</div>Días</div><div class="time-unit"><div class="time-number">${hours%24}</div>Horas</div><div class="time-unit"><div class="time-number">${minutes%60}</div>Min</div><div class="time-unit"><div class="time-number">${seconds%60}</div>Seg</div>`;
            }
            updateCounter(); setInterval(updateCounter,1000);
            document.querySelectorAll('.deco-clickable').forEach(d => d.onclick = () => alert(d.getAttribute('data-msg')));
            modalDiv.querySelector('#downloadLove').onclick = () => alert("Certificado de amor eterno descargado (simulado)");
        }
        
        // Auto completar demo (para pruebas)
        setTimeout(() => { markSectionComplete(secNum); modalDiv.querySelector('#simulateComplete'+secNum)?.click(); }, 30000);
    }
    
    // ========== INICIALIZACIÓN ==========
    function init() {
        buildMenu();
        globalAudio.volume = 0.5;
        loadSong(0);
        document.getElementById('globalPrev').onclick = prevSong;
        document.getElementById('globalPlayPause').onclick = togglePlay;
        document.getElementById('globalNext').onclick = nextSong;
        // Regalo
        let clics = 0;
        document.getElementById('giftCard').onclick = () => {
            if(clics < CLICS_NECESARIOS) {
                clics++; document.getElementById('giftFill').style.width = (clics/CLICS_NECESARIOS)*100+'%';
                document.getElementById('clickCounter').innerText = `${clics} / ${CLICS_NECESARIOS} clics`;
                if(clics === CLICS_NECESARIOS) {
                    document.getElementById('giftScreen').style.opacity = '0';
                    setTimeout(() => { document.getElementById('giftScreen').style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; globalAudio.play().catch(e=>console.log); }, 800);
                }
            }
        };
        // Corazones flotantes
        setInterval(() => { let h = document.createElement('div'); h.className='floating-heart'; h.innerText=['💗','💖','💕','🌸'][Math.floor(Math.random()*4)]; h.style.left=Math.random()*100+'vw'; document.body.appendChild(h); setTimeout(()=>h.remove(),11000); }, 1000);
    }
    init();
</script>
</body>
</html>
